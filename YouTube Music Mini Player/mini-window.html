<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Music Mini Window</title>
    <link rel="stylesheet" href="./mini-window.css">
</head>
<body>
    <main class="window-shell" aria-label="Mini player">
        <canvas id="artwork-canvas" class="artwork-canvas" aria-hidden="true"></canvas>
        <div class="hover-overlay" aria-hidden="true"></div>

        <div class="control-strip top-left-controls">
            <div class="mode-group" role="group" aria-label="Mini window display mode">
                <button id="album-art-mode-button" class="pill-button mode-button" type="button" data-mode="album-art">
                    Album Art
                </button>
                <button id="visualizer-mode-button" class="pill-button mode-button" type="button" data-mode="visualizer">
                    Visualizer
                </button>
            </div>

            <div id="visualizer-picker-wrapper" class="visualizer-picker" hidden>
                <button id="visualizer-picker-button" class="pill-button dropdown-button" type="button" aria-haspopup="true" aria-expanded="false">
                    <span id="visualizer-picker-label">Waveforms</span>
                    <span class="dropdown-chevron" aria-hidden="true"></span>
                </button>
                <div id="visualizer-menu" class="visualizer-menu" hidden></div>
            </div>
        </div>

        <button id="close-button" class="control-button close-button" type="button" aria-label="Close mini window" title="Close mini window">
            X
        </button>
        <button id="playback-button" class="control-button playback-button" type="button" data-state="paused" aria-label="Play" title="Play">
            <span class="playback-icon" aria-hidden="true"></span>
        </button>
    </main>
    <script type="module" src="./mini-window-renderer.js"></script>
</body>
</html>
